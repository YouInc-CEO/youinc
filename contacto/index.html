<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contacto | YOU Inc.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-image: linear-gradient(
                rgba(0, 0, 0, 0.7),
                rgba(0, 0, 0, 0.7)
            ),
            url('../images/background-final-green.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
            font-family: Inter, Arial, sans-serif;
            text-align: center;
            padding: 4rem 2rem;
        }

        h1,
        p,
        .email-box {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        p {
            animation-delay: 0.2s;
        }

        .email-box {
            animation-delay: 0.4s;
            margin-top: 2rem;
            font-size: 1.1rem;
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 12px;
            display: inline-block;
        }

        a {
            color: #1aff64;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Logo Styles & Shimmer */
        .logo-container {
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .logo-container a {
            display: block;
            width: 100%;
            height: 100%;
        }

        .logo-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            animation: shimmer 6s infinite;
            pointer-events: none;
        }

        .main-logo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            transform: scale(1.2);
        }

        @keyframes shimmer {
            0%, 90% {
                left: -150%;
            }
            100% {
                left: 150%;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- LOGO (VUELVE AL MENÚ PRINCIPAL) -->
    <div class="logo-container">
        <a href="../index.html">
            <img src="../images/logo-you.png" alt="YOU Inc Logo" class="main-logo">
        </a>
    </div>

    <h1>Contacto</h1>

    <p>Para colaboraciones, propuestas o contacto directo:</p>

    <div class="email-box">
        📩 <a href="mailto:le_sc06@hotmail.com">le_sc06@hotmail.com</a>
    </div>

</body>
</html>
