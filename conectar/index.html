<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Conectar | YOU Inc.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('../images/background-final-green.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
            font-family: Inter, Arial, sans-serif;
            text-align: center;
            padding: 3rem 1.5rem;
        }

        h1 {
            margin-bottom: 2.5rem;
            font-size: 1.8rem;
            font-weight: 600;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            max-width: 380px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: 0.2s;
        }

        a.social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1.1rem;
            background: #1a1a1a;
            border-radius: 14px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        a.social-link:hover {
            background: #1aff64;
            color: #000;
            transform: translateY(-2px);
        }

        a.social-link img {
            width: 22px;
            height: 22px;
        }

        /* Logo Styles & Shimmer */
        .logo-container {
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .logo-container a {
            display: block;
            width: 100%;
            height: 100%;
        }

        .logo-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            animation: shimmer 6s infinite;
            pointer-events: none;
        }

        .main-logo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            transform: scale(1.2);
        }

        @keyframes shimmer {
            0%, 90% {
                left: -150%;
            }
            100% {
                left: 150%;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- LOGO (VUELVE AL MENÚ PRINCIPAL) -->
    <div class="logo-container">
        <a href="../index.html">
            <img src="../images/logo-you.png" alt="YOU Inc Logo" class="main-logo">
        </a>
    </div>

    <h1>Conectar con YOU Inc.</h1>

    <div class="links">

        <!-- YouTube -->
        <a class="social-link"
           href="https://www.youtube.com/@you.offici"
           target="_blank"
           rel="noopener">
            <img src="../icons/youtube.svg" alt="YouTube">
            YouTube
        </a>

        <!-- TikTok -->
        <a class="social-link"
           href="https://www.tiktok.com/@you.oficiall"
           target="_blank"
           rel="noopener">
            <img src="../icons/tiktok.svg" alt="TikTok">
            TikTok
        </a>

        <!-- Instagram -->
        <a class="social-link"
           href="https://www.instagram.com/you.officialcount"
           target="_blank"
           rel="noopener">
            <img src="../icons/instagram.svg" alt="Instagram">
            Instagram
        </a>

    </div>

</body>
</html>
