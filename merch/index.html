<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Merch | YOU Inc.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('../images/background-final-green.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
            font-family: Inter, Arial, sans-serif;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .merch-grid {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: 0.2s;
        }

        .item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1.5rem;
            width: 260px;
        }

        .item img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .item h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <h1>Merch Oficial YOU Inc.</h1>

    <div class="merch-grid">

        <div class="item">
            <img src="../merch/camiseta-1.png" alt="Camiseta YOU Inc">
            <h2>Camiseta YOU Inc.</h2>
            <p>Edición oficial</p>
        </div>

        <div class="item">
            <img src="../merch/sudadera-1.png" alt="Sudadera YOU Inc">
            <h2>Sudadera YOU Inc.</h2>
            <p>Edición oficial</p>
        </div>

    </div>

</body>

</html>
